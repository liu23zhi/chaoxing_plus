<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>超星学习通助手</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="app">
    <header class="header">
      <img src="../icons/icon48.png" alt="icon" class="logo" />
      <div class="header-text">
        <h1>超星学习通助手</h1>
        <p class="version">v1.0.0</p>
      </div>
      <!-- Master toggle -->
      <label class="toggle" title="启用/禁用插件">
        <input type="checkbox" id="enabled" />
        <span class="slider"></span>
      </label>
    </header>

    <div id="main-settings">
      <section class="section">
        <h2>🎬 视频设置</h2>
        <div class="row">
          <label for="autoPlay">自动播放</label>
          <label class="toggle">
            <input type="checkbox" id="autoPlay" />
            <span class="slider"></span>
          </label>
        </div>
        <div class="row">
          <label for="playbackRate">播放倍速</label>
          <div class="speed-controls">
            <select id="playbackRatePreset">
              <option value="">自定义</option>
              <option value="1">1.0x</option>
              <option value="1.25">1.25x</option>
              <option value="1.5">1.5x</option>
              <option value="1.75">1.75x</option>
              <option value="2">2.0x</option>
              <option value="2.5">2.5x</option>
              <option value="3">3.0x</option>
              <option value="4">4.0x</option>
              <option value="6">6.0x</option>
              <option value="8">8.0x</option>
              <option value="12">12.0x</option>
              <option value="16">16.0x</option>
              <option value="20">20.0x</option>
            </select>
            <input id="playbackRateCustom" type="text" inputmode="decimal" placeholder="自定义" />
          </div>
        </div>
        <div class="speed-warning">
          <p>⚠️ 超星后台可以看到学习时长，请谨慎设置</p>
        </div>
        <div class="row">
          <label for="muteVideo">静音播放</label>
          <label class="toggle">
            <input type="checkbox" id="muteVideo" />
            <span class="slider"></span>
          </label>
        </div>
        <div class="row">
          <label for="autoNextTask">完成后自动下一任务</label>
          <label class="toggle">
            <input type="checkbox" id="autoNextTask" />
            <span class="slider"></span>
          </label>
        </div>
        <div class="row">
          <label for="videoQuizStrategy">视频弹题策略</label>
          <select id="videoQuizStrategy">
            <option value="random">随机答题</option>
            <option value="ignore">忽略</option>
          </select>
        </div>
      </section>

      <section class="section">
        <h2>📄 课程学习</h2>
        <div class="row">
          <label for="autoStudyDoc">自动翻PPT/文档</label>
          <label class="toggle">
            <input type="checkbox" id="autoStudyDoc" />
            <span class="slider"></span>
          </label>
        </div>
      </section>

      <section class="section">
        <h2>📝 作业/考试</h2>
        <div class="row">
          <label for="autoAnswer">自动答题</label>
          <label class="toggle">
            <input type="checkbox" id="autoAnswer" />
            <span class="slider"></span>
          </label>
        </div>
        <div class="row">
          <label for="answerDelayMs">答题延迟 (ms)</label>
          <input type="number" id="answerDelayMs" min="500" max="10000" step="100" />
        </div>
        <div class="row column">
          <label for="questionBankUrls">题库 API 地址（每行一个）</label>
          <textarea id="questionBankUrls" rows="3"
            placeholder="https://your-api.example.com/query"></textarea>
        </div>
      </section>
    </div>

    <footer>
      <button id="saveBtn" class="btn primary">💾 保存设置</button>
      <div id="status" class="status"></div>
    </footer>
  </div>
  <script type="module" src="popup.ts"></script>
</body>
</html>
